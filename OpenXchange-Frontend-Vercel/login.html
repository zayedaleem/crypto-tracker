<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Portal Login | OpenXchange</title>

<style>
body {
  background: #060b18;
  color: #e5e7eb;
  font-family: Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  background:#0b1220;
  padding:30px;
  border-radius:12px;
  width:320px;
  box-shadow:0 0 30px rgba(0,0,0,0.5);
}

input {
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#111827;
  border:1px solid #1f2937;
  border-radius:6px;
  color:white;
}

button {
  width:100%;
  margin-top:15px;
  padding:10px;
  background:#3b82f6;
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

.error {
  margin-top:10px;
  color:#ef4444;
  display:none;
}
</style>
</head>

<body>

<div class="card">
  <h2>Secure Access</h2>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Log In</button>

  <div id="error" class="error"></div>
</div>

<script>
window.BACKEND_URL = "https://crypto-tracker-production-19c6.up.railway.app";

function showError(msg){
  const el = document.getElementById("error");
  el.innerText = msg;
  el.style.display = "block";
}

async function login(){
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!username || !password){
    showError("Enter username and password");
    return;
  }

  try {
    const res = await fetch(window.BACKEND_URL + "/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if(data.require2faSetup && data.setupToken){
      sessionStorage.setItem("setupToken", data.setupToken);
      window.location.href = "/setup-2fa";
      return;
    }

    if(data.token){
      sessionStorage.setItem("token", data.token);
      window.location.href = "/dashboard";
      return;
    }

    showError("Login failed");

  } catch(err){
    showError("Server error");
  }
}
</script>

</body>
</html>
